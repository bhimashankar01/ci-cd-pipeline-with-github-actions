name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-linters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
       
      - name: Install linters
        run: |
          pip install flake8 isort pylint black
      
      - name: Run Flake8 linting
        run: |
          echo "Running Flake8..."
          flake8 src --max-line-length=120 --statistics  --ignore=F401,E203,W503

      - name: Check import order with isort
        run: |
          echo "Running isort..."
          isort --check-only --profile black --line-length 120  src

      - name: Run Pylint quality check
        #        continue-on-error: true
        run: |
          echo "Running pylint..."
          pylint --disable=R0914,W0718,E0401,R0801 --output-format=colorized --max-line-length=120 --fail-under=9.0 src

      - name: Run Black formatting check
        run: |
          echo "Running Black..."
          black --check --line-length 120 src
  
  test:
    name: Execute Tests
    needs: [run-linters]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: pytest tests/ -v